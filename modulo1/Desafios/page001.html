<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 001</title>
</head>
<body>
    <h1>Desafio das mensagens</h1>
    <h2>Tipo 1: com a tag &lt;br&gt;</h2>
    <p>*Um 
        <br>**Dois 
        <br>***Três 
        <br>****Quatro
        <br>
        <br>****Quatro 
        <br>***Três 
        <br>**Dois 
        <br>*Um</p>
    <p>-------------</p>
    <h2>Tipo 2: com a tag &lt;p&gt;</h2>
    <p>*Um</p>
    <p>**Dois</p>
    <p>***Três</p>
    <p>****Quatro</p>
    <p><br>****Quatro</p>
    <p>***Três</p>
    <p>**Dois</p>
    <p>*Um</p>
</body>
</html>
