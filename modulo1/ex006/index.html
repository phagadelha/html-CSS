<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entendendo Hierarquia de Headings (Títulos)</title>
</head>
<body>
    <!--Todos os "h" são em negrito.-->
    <h1>Títulos.</h1>
    <h2>Subtítulo.
    </h2>
    <h3>Assuntos dentro do Subtítulo.</h3>
    <h4>Assuntos dentro dos Assuntos do Subtítulo.</h4>
    <h5>Mais Adentro</h5>
    <h6>Mais Adentro ainda (parece rodapé/observaçoes)</h6>
    <p>Parágrafo.</p>
</body>
</html>
