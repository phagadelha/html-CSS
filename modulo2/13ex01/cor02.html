<head>

    <title>Gradiente em CSS</title>
    <!--As configuraçoes globais, aparentemente nao precisa mais ser utilizada, mas anotei abaixo-->

        * { /* Configurações globais da CSS */
            height: 100%;
        body {
            background-image: linear-gradient(45deg, #FF69B6,#FE0A00,#FFFE03, #FF8E00, #008F01, #00C2C2, #3F0099, #8F008E 85%)
        }
        
    </style>
</head>
