<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body { 
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif
        }
        a { 
            color: rgb(187, 58, 118);
            text-decoration: none;
            font-weight: normal;
        }
        a:visited { 
            color: rgb(36, 171, 9);
        }
        a:hover { 
            color: blue;
            text-decoration: underline;
            font-weight: bolder;
        }
        a:active { 
            color: darksalmon;
        }
        /*
        # = id
        . = class
        : = pseudo-class
        :: = pseudo-element
        > = children
        */
    </style>
    <!--Active: se voce clicar, momentaneamente ele muda de cor-->
    <!--Visited: muda se voce visitar o site-->
    <!--Hover: Passa o mouse por cima e ele muda-->
    <!--After e Before: escreve antes e depois do conteudo-->
    <!--Pseudoelementos e pseudoclasses tambem podem usar seletores (id e class)-->
    
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/phagadelha">Repositorio Github</a></li>
        <li><a href="https://youtube.com">Canal Youtube</a></li>
        <li><a href="https://www.estudonauta.com/">Site do Curso em Vídeo</a></li>
    </ul>

    
</body>
</html>
