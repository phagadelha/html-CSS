<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h1, initial-scale=1.0">
    <title>Seletores Personalizados</title>
    <style>
        div {
            background-color: darkgrey;
            border: 1px solid black;
            text-align: center;
            height: 200px;
            width: 200px;
        }
        div > p { 
            display: none
        }
        div:hover {
            color: rgb(255, 255, 255);
            background-color: blueviolet;
        }
      
    </style>
</head>
    <!--Continuaçao-->
    <!--pseudoclasses -->
    <!--hover: quando passa o mouse em cima ele muda a configuraçao, exemplo: cor-->

<body>
    <h1>Exemplo de Hover</h1>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
    <h1>Mais um exemplo de Hover com Texto escondido</h1>
    <p>Passe o mouse sobre o texto abaixo</p>
    <div>
        Exemplo de Hover
        <p>Texto escondido</p>
    </div>

</body>
</html>
