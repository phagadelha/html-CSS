<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
        Peso é quando a letra fica mais "gordinha"
        font-weight = peso
        font-width = largura
        font-height = altura
        lighter = mais 'magrinha'
        bold = negrito
        bolder = mais negrito

        o weight vai de 100 a 900
        100 = lighter
        900 = bolder

        */
        h1 {
            font-size: large;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bolder;
        }
        h2{
            font-size: medium;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
        }
        p {
            font-size: small;
            font-family: calibri;
            font-weight: lighter;
        }
        /*shorthand (dar uma maozinha)
        condensar as fontes use só font e siga a ordem abaixo
        font-style > font-weight > font-size > font-family
        exemplo: font: italic bolder 3em 'Work Sans', sans-serif
         
    </style>
</head>
<body>
    <h1>Titulo do texto</h1>
    
    <h2>Subtitulo do texto</h2>

    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Dignissimos, voluptatem ipsam repudiandae a quasi velit debitis perspiciatis incidunt vitae quaerat officiis obcaecati aperiam quod similique! Molestias sunt distinctio deserunt velit.</p>


    
</body>
</html>
